<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Estagios Medicos</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Estagios</h1>
            <p class="subtitle">Santa Casa / UFCSPA</p>
        </div>
        <div class="sidebar-body">
            <div class="sidebar-nav">
                <a href="/" class="nav-link">Estagios</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/usuarios" class="nav-link active">Usuarios</a>
            </div>
            <div class="sidebar-user" id="sidebar-user">
                <strong>Carregando...</strong>
                <span></span>
            </div>
            <div style="margin-top:8px;">
                <button class="btn btn-ghost" onclick="location.href='/logout'" style="width:100%;">Sair</button>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <div class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
            <h2>Usuarios</h2>
            <div class="topbar-right">
                <button class="btn btn-sm btn-primary" onclick="abrirModalNovo()">+ Novo Usuario</button>
                <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">&#9790;</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Nome</th>
                        <th>Papel</th>
                        <th>Ultimo Login</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody id="tabela-usuarios"></tbody>
            </table>
            <div id="empty-state" class="empty-state" style="display:none;">Nenhum usuario cadastrado.</div>
        </div>
    </main>

    <!-- Modal: Novo/Editar Usuario -->
    <div class="modal-overlay" id="modal-usuario">
        <div class="modal" style="max-width:420px;">
            <div class="modal-header">
                <h3 id="modal-titulo">Novo Usuario</h3>
                <button class="btn-icon" onclick="fecharModal('modal-usuario')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="inp-username" placeholder="login do usuario">
                </div>
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="inp-nome" placeholder="Nome do usuario">
                </div>
                <div class="form-group">
                    <label>Senha <span id="senha-hint" style="font-weight:normal;color:var(--color-text-secondary)">(deixe vazio para manter a atual)</span></label>
                    <input type="password" id="inp-senha" placeholder="Senha">
                </div>
                <div class="form-group">
                    <label>Papel</label>
                    <select id="inp-role">
                        <option value="user">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="fecharModal('modal-usuario')">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarUsuario()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Confirmar Exclusao -->
    <div class="modal-overlay" id="modal-confirmar">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3>Confirmar Exclusao</h3>
                <button class="btn-icon" onclick="fecharModal('modal-confirmar')">&times;</button>
            </div>
            <div class="modal-body">
                <p id="msg-confirmar">Deseja realmente excluir este usuario?</p>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="fecharModal('modal-confirmar')">Cancelar</button>
                <button class="btn btn-danger" id="btn-confirmar-excluir">Excluir</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/usuarios';

        // ── Layout helpers ──────────────────────────────────────────────
        function loadTheme() {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        }
        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        async function loadUserInfo() {
            try {
                const r = await fetch('/api/me');
                const d = await r.json();
                const el = document.getElementById('sidebar-user');
                if (el) el.innerHTML = `<strong>${d.nome}</strong><span>${d.role}</span>`;
            } catch(e) {}
        }

        // ── Modais ──────────────────────────────────────────────────────
        function abrirModal(id) { document.getElementById(id).classList.add('open'); }
        function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                fecharModal('modal-usuario');
                fecharModal('modal-confirmar');
            }
        });

        // ── Toast ───────────────────────────────────────────────────────
        function showToast(msg, isErr) {
            let t = document.getElementById('_toast');
            if (!t) {
                t = document.createElement('div');
                t.id = '_toast';
                t.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:.9rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.background = isErr ? '#ef4444' : '#22c55e';
            t.style.opacity = '1';
            clearTimeout(t._tid);
            t._tid = setTimeout(() => { t.style.opacity = '0'; }, 3000);
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        // ── Carregar lista ──────────────────────────────────────────────
        async function carregarUsuarios() {
            const r = await fetch(API);
            const users = await r.json();
            const tbody = document.getElementById('tabela-usuarios');
            const empty = document.getElementById('empty-state');
            if (!users.length) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${esc(u.username)}</td>
                    <td>${esc(u.nome)}</td>
                    <td><span class="badge ${u.role === 'admin' ? 'badge-obs' : 'badge-obr'}">${u.role === 'admin' ? 'Admin' : 'Usuario'}</span></td>
                    <td style="font-size:.82rem;color:var(--color-text-secondary)">${u.last_login || '—'}</td>
                    <td>
                        <button class="btn btn-sm" onclick="editarUsuario(${u.id},'${esc(u.username)}','${esc(u.nome)}','${u.role}')">Editar</button>
                        <button class="btn btn-sm btn-danger" onclick="confirmarExcluir(${u.id},'${esc(u.nome)}')" style="margin-left:4px;">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        // ── Novo / Editar ───────────────────────────────────────────────
        function abrirModalNovo() {
            document.getElementById('modal-titulo').textContent = 'Novo Usuario';
            document.getElementById('edit-id').value = '';
            document.getElementById('inp-username').value = '';
            document.getElementById('inp-nome').value = '';
            document.getElementById('inp-senha').value = '';
            document.getElementById('inp-role').value = 'user';
            document.getElementById('senha-hint').style.display = 'none';
            document.getElementById('inp-senha').placeholder = 'Senha';
            abrirModal('modal-usuario');
        }

        function editarUsuario(id, username, nome, role) {
            document.getElementById('modal-titulo').textContent = 'Editar Usuario';
            document.getElementById('edit-id').value = id;
            document.getElementById('inp-username').value = username;
            document.getElementById('inp-nome').value = nome;
            document.getElementById('inp-senha').value = '';
            document.getElementById('inp-role').value = role;
            document.getElementById('senha-hint').style.display = 'inline';
            document.getElementById('inp-senha').placeholder = 'Nova senha (opcional)';
            abrirModal('modal-usuario');
        }

        async function salvarUsuario() {
            const id = document.getElementById('edit-id').value;
            const username = document.getElementById('inp-username').value.trim();
            const nome = document.getElementById('inp-nome').value.trim();
            const senha = document.getElementById('inp-senha').value;
            const role = document.getElementById('inp-role').value;

            if (!username || !nome) { showToast('Preencha username e nome', true); return; }
            if (!id && !senha) { showToast('Senha obrigatoria para novo usuario', true); return; }

            const body = { username, nome, role };
            if (senha) body.senha = senha;

            const r = await fetch(id ? `${API}/${id}` : API, {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(body)
            });
            const data = await r.json();
            if (!r.ok) { showToast(data.erro || 'Erro ao salvar', true); return; }

            fecharModal('modal-usuario');
            carregarUsuarios();
            showToast(id ? 'Usuario atualizado!' : 'Usuario criado!');
        }

        // ── Excluir ─────────────────────────────────────────────────────
        let excluirId = null;
        function confirmarExcluir(id, nome) {
            excluirId = id;
            document.getElementById('msg-confirmar').textContent = `Excluir usuario "${nome}"?`;
            abrirModal('modal-confirmar');
        }
        document.getElementById('btn-confirmar-excluir').onclick = async () => {
            if (!excluirId) return;
            const r = await fetch(`${API}/${excluirId}`, { method: 'DELETE' });
            const data = await r.json();
            if (!r.ok) { showToast(data.erro || 'Erro ao excluir', true); }
            else { showToast('Usuario excluido!'); carregarUsuarios(); }
            fecharModal('modal-confirmar');
            excluirId = null;
        };

        // ── Init ────────────────────────────────────────────────────────
        loadTheme();
        loadUserInfo();
        carregarUsuarios();
    </script>
</body>
</html>

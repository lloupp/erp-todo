<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h1>Estágios</h1>
        <p class="subtitle">Santa Casa / UFCSPA</p>
    </div>
    <div class="sidebar-body">
        <div class="sidebar-nav">
            <a href="/dashboard" class="nav-link{{ ' active' if active_page == 'dashboard' else '' }}">Dashboard</a>
            <a href="/residentes" class="nav-link{{ ' active' if active_page == 'residentes' else '' }}">Residentes</a>
            <a href="/relatorios" class="nav-link{{ ' active' if active_page == 'relatorios' else '' }}">Relatórios</a>
            <a href="/usuarios" class="nav-link{{ ' active' if active_page == 'usuarios' else '' }}" id="nav-usuarios" style="display:none;">Usuários</a>
            <a href="/configuracoes" class="nav-link{{ ' active' if active_page == 'configuracoes' else '' }}" id="nav-configuracoes" style="display:none;">Configurações</a>
        </div>
        <div class="sidebar-user" id="sidebar-user">
            <strong>Carregando...</strong>
            <span></span>
        </div>
        <div style="margin-top:8px;">
            <button class="btn btn-ghost" onclick="location.href='/logout'" style="width:100%;">Sair</button>
        </div>
    </div>
</aside>
<script>
/* Revela links admin-only (Usuários/Vagas) apenas para administradores.
   Self-contained: funciona em qualquer pagina que inclua a sidebar,
   independente do JS principal de cada modulo. */
(function () {
    fetch('/api/me')
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (u) {
            if (u && u.role === 'admin') {
                ['nav-usuarios', 'nav-vagas', 'nav-configuracoes'].forEach(function (id) {
                    var e = document.getElementById(id);
                    if (e) e.style.display = '';
                });
            }
        })
        .catch(function () {});
})();
</script>
<!-- Assistente IA (botão flutuante global) -->
<script src="/static/js/ai.js?v={{ range(1,99999) | random }}"></script>
